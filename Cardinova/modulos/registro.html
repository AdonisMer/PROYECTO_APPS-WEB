<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../src/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> 
    <title>Registro</title>
</head>
    <body>
        <section class="producto1">
            <div class="etiqueta">
                <span>
                    <i class="fa-solid fa-user-plus"></i>
                    REGISTRO
                </span>            
            </div>
            <h2>Crea tu cuenta</h2>
            <form class="formulario1 centrado">
                <fieldset>
                    <legend>Registro</legend>
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" required>
                    <label for="correo">Correo electrónico:</label>
                    <input type="email" id="correo" name="correo" required>
                    <label for="password">Contraseña:</label>
                    <div class="input-password">
                        <input type="password" id="password" name="password" required>
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar contraseña">
                            <i class="fa-solid fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    <label for="confirmar">Confirmar contraseña:</label>
                    <div class="input-password">
                        <input type="password" id="confirmar" name="confirmar" required>
                        <button type="button" class="toggle-password" id="toggleConfirm" aria-label="Mostrar contraseña">
                            <i class="fa-solid fa-eye" id="eyeIconConfirm"></i>
                        </button>
                    </div>
                    <button type="submit" class="botones boton-registrar-consulta">
                        Crear cuenta
                    </button>
                    <p class="texto-centro">
                        ¿Ya tienes cuenta?
                        <a href="login.html">Inicia sesión</a>
                    </p>
                </fieldset>
            </form>
        </section>
        <div class="volver-container">
            <a href="../index.html" class="botones">⬅ Volver al inicio</a>
        </div>
        <footer class="footer">
            <div class="redes">
                <a href="https://github.com/usuario" target="_blank" rel="noopener" aria-label="GitHub">
                    <i class="fa-brands fa-github"></i>
                </a>
                <a href="https://www.uleam.edu.ec/" target="_blank" rel="noopener" aria-label="Sitio web">
                    <i class="fa-solid fa-globe"></i>
                </a>
                <a href="mailto:correo@uleam.edu.ec" aria-label="Email">
                    <i class="fa-solid fa-envelope"></i>
                </a>
            </div>
            <p>&copy; 2026 · Cardinova · ULEAM · Hecho con HTML y CSS </p>
        </footer>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
